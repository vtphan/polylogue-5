# Schema: Transcript (Pre-Enumeration)
# The dialog writer's raw output before turn/sentence IDs are assigned.
# Matches transcript.yaml but without turn_id and sentence_id fields.
# Source: pipeline-spec.md Section 2.2

schema:
  root:
    type: object
    fields:
      scenario_id:
        type: string
        required: true

      personas:
        type: list
        required: true
        description: Persona metadata for app rendering.
        items:
          type: object
          fields:
            name:
              type: string
              required: true
            perspective:
              type: string
              required: true
              description: Brief description (student-visible).

      turns:
        type: list
        required: true
        description: The discussion turns, without enumerated IDs.
        constraints:
          min_length: 10
          max_length: 14
        items:
          type: object
          fields:
            speaker:
              type: string
              required: true
              description: Persona name.
            sentences:
              type: list
              required: true
              description: 1-3 sentences per turn.
              constraints:
                min_length: 1
                max_length: 3
              items:
                type: object
                fields:
                  text:
                    type: string
                    required: true
                    description: The sentence text.
