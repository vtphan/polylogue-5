# Schema: Facilitation Guide
# Describes the structure of registry/{scenario_id}/facilitation.yaml
# Teacher-facing document. Uses facet language openly.
# Produced by evaluator (Stage 3), enriched by scaffolding ID (Stage 4).
# Source: pipeline-spec.md Section 2.4

schema:
  root:
    type: object
    fields:
      scenario_id:
        type: string
        required: true

      overview:
        type: object
        required: true
        fields:
          topic:
            type: string
            required: true
          targeted_facets_summary:
            type: string
            required: true
            description: Plain-language summary of what's designed into the discussion.
          session_timing:
            type: string
            required: true
            description: Suggested time allocation for the session.
          what_to_expect:
            type: string
            required: true
            description: >
              General guidance: what students tend to notice first, where they
              struggle, common misconceptions.

      passage_guides:
        type: list
        required: true
        description: One entry per evaluable passage.
        items:
          type: object
          fields:
            passage_id:
              type: string
              required: true
              constraints:
                pattern: "passage_\\d{2}"
            turns:
              type: list
              required: true
              items:
                type: string
            summary:
              type: string
              required: true
              description: What happens in this passage, in plain language.

            whats_here:
              type: list
              required: true
              description: What is structurally present (teacher-facing, uses facet language).
              items:
                type: object
                fields:
                  facet:
                    type: string
                    required: true
                    description: Facet name (e.g., "source credibility").
                  quality:
                    type: string
                    required: true
                    description: '"strong", "weak", or brief description.'
                  visible_through:
                    type: list
                    required: true
                    description: Which lenses reveal it.
                    items:
                      type: string
                  explanation:
                    type: string
                    required: true
                    description: Why it's this way — cognitive pattern, social dynamic, or both.

            # --- State-based facilitation (per-passage state machine) ---
            diagnose:
              type: object
              required: true
              description: >
                Guidance for the Diagnose state — individual students writing
                their diagnosis before peers' are visible.
              fields:
                if_students_are_stuck:
                  type: string
                  required: true
                  description: >
                    Lens-based redirects. E.g., "Try looking through the
                    Evidence lens — what do you notice about the sources?"

            discuss:
              type: object
              required: true
              description: >
                Guidance for the Discuss state — group discussion after
                all members have submitted diagnoses.
              fields:
                likely_disagreements:
                  type: string
                  required: true
                  description: Where students are likely to see different things.
                productive_questions:
                  type: list
                  required: true
                  description: >
                    Questions the teacher can pose to deepen discussion.
                    Initially from evaluator; enriched by scaffolding ID.
                  items:
                    type: string
                watch_for:
                  type: string
                  required: true
                  description: Signs that discussion is productive vs. stalled.

            ai_perspective:
              type: object
              required: true
              description: >
                Guidance for the Reviewing AI state — after group accesses
                the AI perspective (via lifeline or free after assessment).
              fields:
                what_the_ai_will_say:
                  type: string
                  required: true
                  description: Summary of the unified AI perspective (no surprises for teacher).
                likely_student_reactions:
                  type: string
                  required: true
                follow_up:
                  type: string
                  required: true
                  description: How to build on the AI perspective in discussion.

            # --- Observation predictions ---
            likely_observations:
              type: list
              required: true
              description: Per-lens predictions inlined for teacher convenience.
              items:
                type: object
                fields:
                  lens:
                    type: string
                    required: true
                    constraints:
                      enum: [logic, evidence, scope]
                  will_likely_see:
                    type: list
                    required: true
                    items:
                      type: string
                  might_miss:
                    type: list
                    required: true
                    items:
                      type: string

      # --- Whole-class debrief materials ---
      debrief:
        type: object
        required: true
        description: Materials for whole-class discussion after groups complete all passages.
        fields:
          key_takeaways:
            type: list
            required: true
            description: >
              2-3 main insights from this scenario. Written in teacher language
              (uses facet vocabulary).
            items:
              type: string
          cross_group_prompts:
            type: list
            required: true
            description: >
              Questions to surface cross-group patterns and make the perspectival
              learning model visible at the class level.
            items:
              type: string
          connection_to_next:
            type: string
            required: false
            description: >
              Optional bridge to future sessions — what capacity this session
              exercised and what might come next. Does not assume a fixed sequence.
