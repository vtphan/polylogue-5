scenario_id: school-garden-water

personas:
  - name: Lena
    perspective: Wants to build a rainwater collection system for the school garden
  - name: Derek
    perspective: Thinks they should just use the school's hose to keep things simple

turns:
  - speaker: Derek
    sentences:
      - text: "I think we should just use the hose, it's literally right there by where the garden's gonna go."
      - text: "Plus we gotta have this running by spring so we don't really have time to get all fancy."

  - speaker: Lena
    sentences:
      - text: "Okay but I found this website about rain barrels and it's actually really cool."
      - text: "You collect rainwater and use it for the garden, and it's way better for the environment."

  - speaker: Derek
    sentences:
      - text: "Rain barrels?"
      - text: "That sounds like a lot of work, and we don't even know how to build something like that."

  - speaker: Lena
    sentences:
      - text: "No, it's not that hard, this one garden in Portland used them and they got plenty of water for their whole garden just from rain."
      - text: "The website said it totally works."
      - text: "So ours would definitely get enough water too."

  - speaker: Derek
    sentences:
      - text: "Wait, Portland?"
      - text: "Doesn't it rain like constantly there? I don't think we get anywhere near that much rain."

  - speaker: Lena
    sentences:
      - text: "I mean, it rains here too."
      - text: "And think about how cool it would look — we'd have these barrels all set up and everyone would be like, whoa, they actually built something real."

  - speaker: Derek
    sentences:
      - text: "I guess you did actually look into it and I didn't, so maybe you have a point."

  - speaker: Lena
    sentences:
      - text: "Okay so we could put the barrels along the fence right next to the garden and run a little hose down to the plants."
      - text: "I already kind of have the whole thing planned out."

  - speaker: Derek
    sentences:
      - text: "Oh wait, we could put them by the corner where the roof drains go — they'd fill up way faster that way."

  - speaker: Lena
    sentences:
      - text: "Yes, that's perfect!"
      - text: "This is seriously gonna be the best project, we should totally talk about it when we present to the class."

  - speaker: Derek
    sentences:
      - text: "Yeah, let's start building soon so it's ready in time."
      - text: "I'm actually kinda excited about this now."

  - speaker: Lena
    sentences:
      - text: "Okay so rain barrels it is, that's our plan."
      - text: "Let's figure out what we need and start on the design this week."
