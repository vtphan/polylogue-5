    facet_annotations:
      - facet_id: perspective_breadth
        quality_level: weak
        evidence_sentences:
          - turn_10.s01
          - turn_11.s01
          - turn_12.s01
          - turn_12.s02
        primary_lens: scope
        also_visible_through:
          - evidence
        explanatory_variables:
