          social_dynamic: groupthink
          interaction: >
            The planning continues with increasing confidence. They divide up
            work, set a timeline, and confirm the decision — all without any
            mention of adults, approval processes, or long-term maintenance. The
            mutual enthusiasm has fully replaced any questioning impulse.
        was_targeted: true
        notes: >
          The perspective breadth weakness solidifies here. The students commit
          to a plan involving school property modifications, material procurement,
          and a construction timeline — with zero mention of custodial staff,
          the science teacher, the principal, or summer maintenance.

      - facet_id: consequence_consideration
        quality_level: weak
        evidence_sentences:
          - turn_10.s01
          - turn_12.s02
        primary_lens: scope
        also_visible_through:
          - logic
        explanatory_variables:
          cognitive_pattern: tunnel_vision
          social_dynamic: groupthink
          interaction: null
        was_targeted: false
        notes: >
          Emergent facet. The students commit to building and set a timeline but
          do not consider downstream effects — what happens if the barrels do not
          collect enough water, what happens over summer when no one is at school,
          or what happens if they start construction and cannot finish by spring.

    ai_perspective_evaluate:
      through_logic:
        observation: >
          Looking at how this discussion wraps up, I notice the group is very
          confident about their plan. They are dividing up tasks and setting
          deadlines. But I find myself wondering — have they thought through what
          happens next? What if something does not go as planned?
        key_sentences:
          - turn_10.s01
          - turn_12.s02
      through_evidence:
        observation: null
        key_sentences: []
      through_scope:
        observation: >
          By the end of this discussion, the group has a full plan — who does
          what, where to get materials, when to start building. But reading
          through the whole conversation, I notice the plan was made entirely
          by two students. They are planning to modify the school building,
          get materials from a hardware store, and start construction. I keep
          wondering about all the people who are not part of this conversation
          but would be affected by these plans.
        key_sentences:
          - turn_11.s01
          - turn_12.s01
          - turn_12.s02
      what_to_notice: >
        Look at everything Maya and Jake decided in this discussion. Now think
        about who was part of making those decisions.
      what_to_notice_sentences:
        - turn_11.s01
        - turn_12.s02

    ai_perspective_explain:
      explanatory_note: >
        When researchers study group decision-making, they sometimes notice that
        a group can reach a confident decision that feels complete to everyone
        involved — but that is missing something important that nobody in the
        group thought to consider.
      cognitive_connection: >
        One way to think about what happened in this discussion is that both
        Maya and Jake were thinking about the project entirely from their own
        position as students. They considered what they want to build, how
        exciting it would be, and when they could start. But the custodial staff
        who maintain the building, the science teacher who runs the garden club,
        the principal who set the deadline, and the question of what happens over
        summer — none of those perspectives entered the conversation.
      social_connection: >
        Notice how by this point, both students are building on each other's
        excitement. When everyone in a group is enthusiastic and agreeing, it
        can be hard for anyone to slow down and ask "wait, are we missing
        something?" Researchers who study groups notice this pattern — the
        group's shared energy can make it feel like the plan is more complete
        than it actually is.
      interaction_note: >
        Here is where both forces come together across the whole discussion. The
        students see the project only from their own perspective, and their
        shared excitement keeps anyone from stepping back. If either one had
        paused to think about someone else's viewpoint — like the custodian
        who would have to deal with barrels attached to the building — it might
        have opened up a whole set of questions they never considered.

    diversity_potential:
      expected_lens_split: >
        Scope students will see the strongest signal — the absence of
        stakeholder perspectives is most visible here. Logic students may notice
        the lack of contingency planning. Evidence students may notice the group
        is committing to a plan without having gathered key information.
      likely_student_observations:
        - lens: logic
          observations:
            - The group is making a confident plan but has not thought about what could go wrong
            - They set a timeline without considering obstacles
          might_miss:
            - That the issue is specifically about missing perspectives, not just missing planning steps
        - lens: evidence
          observations:
            - They are asking a hardware store for donations without knowing costs
            - No research on local feasibility has been mentioned
          might_miss:
            - That the missing information connects to missing stakeholders
        - lens: scope
          observations:
            - Only two students decided something that affects the whole school community
            - No one mentioned the custodial staff, science teacher, principal, or summer break
            - The group made plans for school property without checking with anyone
          might_miss:
            - The long-term maintenance question — what happens to rain barrels over summer when students are gone
