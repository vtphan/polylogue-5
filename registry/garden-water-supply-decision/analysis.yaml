      - turn_02
      - turn_03
    sentence_range:
      - turn_01.s01
      - turn_01.s02
      - turn_02.s01
      - turn_02.s02
      - turn_03.s01
      - turn_03.s02

    facet_annotations:
      - facet_id: sufficiency
        quality_level: weak
        evidence_sentences:
          - turn_01.s01
          - turn_01.s02
          - turn_03.s02
        primary_lens: evidence
        also_visible_through:
          - scope
          - logic
        explanatory_variables:
          cognitive_pattern: false_certainty
          social_dynamic: null
          interaction: null
        was_targeted: true
        notes: >
          The sufficiency weakness begins here — Maya introduces a single website
          from Portland as her entire evidence base and frames it with confidence.
          The full signal develops in passage 2 when Jake challenges and Maya
