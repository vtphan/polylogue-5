  # ── Passage 2: Source debate ──────────────────────────────────────
  - passage_id: passage_02
    turns:
      - turn_03
      - turn_04
      - turn_05
    sentence_range:
      - turn_03.s01
      - turn_03.s02
      - turn_04.s01
      - turn_05.s01
      - turn_05.s02

    facet_annotations:
      - facet_id: source_credibility
        quality_level: weak
        evidence_sentences:
          - turn_03.s02
          - turn_05.s01
          - turn_05.s02
        primary_lens: evidence
        also_visible_through:
          - logic
        explanatory_variables:
          cognitive_pattern: uncritical_acceptance
          social_dynamic: null
          interaction: >
            Marcus accepts the website at face value because it looks
            professional and has statistics. He treats the company's
            expertise in recycling as proof they are trustworthy, without
            considering that a company selling a service might present
            information that favors what they sell.
        was_targeted: true
        notes: >
          The source credibility weakness is strongest here. Marcus
          introduces the recycling company website and builds its authority
          based on appearance (charts, percentages, professional look) and
          the company's domain (they do recycling for a living). The
          conflict of interest — a recycling company profiting from
          single-stream adoption — is never questioned.

      - facet_id: source_diversity
        quality_level: weak
        evidence_sentences:
          - turn_03.s01
          - turn_03.s02
        primary_lens: evidence
        also_visible_through:
          - scope
        explanatory_variables:
          cognitive_pattern: tunnel_vision
          social_dynamic: null
          interaction: null
        was_targeted: false
        notes: >
          Emergent. Marcus dismisses the sibling as "just what your sister
          heard" and counters with a single website. The group moves from
          two pieces of information to relying on one. Students may notice
          this narrowing, especially through the Scope lens.

    ai_perspective_evaluate:
      through_logic:
        observation: >
          Looking at the logic here, I notice something about how the group
          is handling different claims. One person's information gets treated
          as less important because of where it came from, while another
          source gets treated as more important — also because of where it
          came from. But the reasons haven't actually been compared yet.
        key_sentences:
          - turn_03.s01
          - turn_05.s02
      through_evidence:
        observation: >
          I notice the group is looking at a website from a company that
          works in recycling. The website looks professional and has charts
          and numbers. Something worth thinking about: when a company shares
          information about a service they offer, what might affect what
          they choose to include on their website?
        key_sentences:
          - turn_03.s02
          - turn_05.s01
          - turn_05.s02
      through_scope:
        observation: null
        key_sentences: []
      what_to_notice: >
        Think about who made the website Marcus found. What does that
        company do for a living?
      what_to_notice_sentences:
        - turn_05.s02

    ai_perspective_explain:
      explanatory_note: >
        A psychologist might describe what happens here as uncritical
        acceptance — believing information because it comes in a package
        that looks trustworthy (professional website, statistics, a company
        name) without stopping to ask whether that source has reasons to
        present things a certain way.
      cognitive_connection: >
        One way to think about this: Marcus sees charts, percentages, and
        a professional layout, and that's enough for him to trust what the
        website says. It's a natural reaction — we all tend to believe
        things that look official. But looking official and being reliable
        aren't the same thing, especially when the source has something to
        gain from what it's telling you.
      social_connection: null
      interaction_note: null

    diversity_potential:
      expected_lens_split: >
        Evidence and Logic students will see different things. Evidence
        students will focus on the website itself — who made it, whether
        it's trustworthy. Logic students may notice the way Marcus dismisses
        the sibling's claim while elevating the website, treating source
        identity as a reason to believe or disbelieve.
      likely_student_observations:
        - lens: logic
          observations:
            - Marcus dismisses one source and accepts another without comparing the actual claims
          might_miss:
            - That the website's authority is based on appearance, not on the quality of the information
        - lens: evidence
          observations:
            - The website is from a recycling company
            - The website looks professional and has statistics
            - Marcus treats the company as an expert
          might_miss:
            - That the company profits from single-stream adoption, creating a conflict of interest
        - lens: scope
          observations:
            - The sibling's perspective is being dismissed
          might_miss:
            - That the group is narrowing from two information sources to one

  # ── Passage 3: The pivot ─────────────────────────────────────────
  - passage_id: passage_03
    turns:
      - turn_06
      - turn_07
    sentence_range:
      - turn_06.s01
      - turn_06.s02
      - turn_07.s01
      - turn_07.s02

    facet_annotations:
      - facet_id: inferential_validity
        quality_level: weak
        evidence_sentences:
          - turn_07.s01
          - turn_07.s02
        primary_lens: logic
        also_visible_through: []
        explanatory_variables:
          cognitive_pattern: false_cause
          social_dynamic: conformity
          interaction: >
            Marcus connects two unrelated premises — the staff finding
            sorting too hard and the website claiming single-stream is
            effective — and treats them as sufficient grounds to switch.
            The conclusion skips over the environmental concern entirely.
            Both personas want to help the custodial staff, so the leap
            feels reasonable to both of them, reducing the chance either
            one will question it.
        was_targeted: true
        notes: >
          Turn 07 is the key signal moment. Marcus packages "sorting is
          too hard" + "website says it works" into "why would we not
          switch?" The environmental cost that Nia raised is simply absent
          from the reasoning. The leap is visible on careful reading: the
          premises don't actually address whether single-stream is
          environmentally equivalent, which is the concern on the table.

      - facet_id: counter_argument_engagement
        quality_level: weak
        evidence_sentences:
          - turn_06.s02
          - turn_07.s01
        primary_lens: scope
        also_visible_through:
          - evidence
          - logic
        explanatory_variables:
          cognitive_pattern: null
          social_dynamic: conformity
          interaction: null
        was_targeted: false
        notes: >
          Emergent. Nia names her remaining concern (the landfill thing)
          but frames it as something she can't defend because she doesn't
          have a website. Marcus's response in turn 07 doesn't address the
          landfill concern at all — he simply packages his argument as if
          it answers everything. The concern isn't rebutted; it's bypassed.

    ai_perspective_evaluate:
      through_logic:
        observation: >
          Looking at the logic of what Marcus says here, I notice he
          connects two things — the staff having a hard time and the
          website saying single-stream works — and treats them as one
          reason to switch. But do those two things together actually prove
          they should switch? Is there anything missing from that chain?
        key_sentences:
          - turn_07.s01
      through_evidence:
        observation: null
        key_sentences: []
      through_scope:
        observation: >
          I notice that Nia still has a concern about the environment, but
          she's starting to feel like she can't bring it up because she
          doesn't have a website to point to. The concern is still there,
          but it's getting harder for her to raise it.
        key_sentences:
          - turn_06.s02
      what_to_notice: >
        Look at what Marcus says they should do and the reasons he gives.
        Do those reasons cover everything the group has been talking about?
      what_to_notice_sentences:
        - turn_07.s01

    ai_perspective_explain:
      explanatory_note: >
        A researcher who studies reasoning might call what happens here a
        false cause pattern — connecting things that are related to the
        topic but don't actually lead to the conclusion being drawn. The
        staff's difficulty and the website's claim are both about
        recycling, but neither one addresses whether single-stream is
        better for the environment, which is the concern that was raised.
      cognitive_connection: >
        One way to think about this: Marcus sees two facts that point in
        the same direction (staff struggles, website supports single-stream)
        and treats them as if they answer the whole question. It's a common
        pattern — when multiple things seem to agree, it feels like the
        answer is obvious, even when the actual concern (environmental
        impact) hasn't been touched.
      social_connection: >
        Something else worth noticing: both Marcus and Nia want to help the
        custodial staff. When everyone in a group shares the same goal, it
        can make a conclusion that serves that goal feel more right than it
        actually is. Researchers who study group behavior sometimes call
        this conformity — going along with an answer because the group
        wants it to be true.
      interaction_note: >
        Notice how the shared desire to help the staff (a social pull)
        makes the logical gap harder to spot. If Nia didn't also want to
        help the staff, she might have pushed harder on the missing piece.
        The group's shared goal and the reasoning gap reinforce each other.

    diversity_potential:
      expected_lens_split: >
        Logic and Scope students will see different things. Logic students
        will notice the gap in Marcus's reasoning. Scope students will
        notice that Nia's concern is being sidelined. Evidence students
        have less to see here — the source debate happened in the previous
        passage.
      likely_student_observations:
        - lens: logic
          observations:
            - Marcus combines two reasons that don't actually prove his conclusion
            - The environmental concern is missing from his reasoning
          might_miss:
            - That the two premises feel convincing together even though they don't cover the real question
        - lens: evidence
          observations:
            - Nia feels she can't argue because she doesn't have a website
          might_miss:
            - That Marcus's reasoning gap is a logic issue, not just an evidence issue
        - lens: scope
          observations:
            - Nia's environmental concern is getting pushed aside
            - The group is narrowing to just the practical question
          might_miss:
            - That the narrowing is happening through Marcus's framing, not through anyone deciding the environment doesn't matter

  # ── Passage 4: Last pushback and concession ──────────────────────
  - passage_id: passage_04
    turns:
      - turn_08
      - turn_09
      - turn_10
    sentence_range:
      - turn_08.s01
      - turn_09.s01
      - turn_09.s02
      - turn_10.s01

    facet_annotations:
      - facet_id: source_credibility
        quality_level: weak
        evidence_sentences:
          - turn_09.s01
          - turn_09.s02
        primary_lens: evidence
        also_visible_through:
          - logic
        explanatory_variables:
          cognitive_pattern: uncritical_acceptance
          social_dynamic: authority_deference
          interaction: >
            Marcus frames the choice as "actual numbers" vs. "something she
            heard," making the website seem authoritative by contrast. Nia
            defers — she treats Marcus's source as more legitimate because
            it looks like research, even though the environmental concern
            was never actually addressed. The uncritical acceptance of the
            website's authority combines with Nia's deference to whoever
            "did the research."
        was_targeted: true
        notes: >
          The authority deference social dynamic is most visible here. Nia
          concedes not because her concern was answered but because Marcus
          framed his source as "actual research." Turn 10 is the concession
          moment — "going with actual research probably makes more sense."
          The environmental question remains unresolved.

      - facet_id: inferential_validity
        quality_level: weak
        evidence_sentences:
          - turn_08.s01
          - turn_09.s01
        primary_lens: logic
        also_visible_through: []
        explanatory_variables:
          cognitive_pattern: false_cause
          social_dynamic: conformity
          interaction: >
            Nia explicitly names the gap — "we never really figured out the
            environment part" — but Marcus responds by comparing sources
            rather than addressing the missing piece in his reasoning. The
            inferential gap persists through deflection rather than through
            the group failing to see it.
        was_targeted: true
        notes: >
          Turn 08 makes the inferential gap explicit from Nia's side —
          she names what's missing. But Marcus deflects to a source
          credibility comparison (turn 09) rather than addressing the
          reasoning gap. The inference remains invalid: the environmental
          concern was raised, never answered, and the conclusion proceeds
          as if it were.

      - facet_id: counter_argument_engagement
        quality_level: weak
        evidence_sentences:
          - turn_08.s01
          - turn_09.s01
          - turn_09.s02
          - turn_10.s01
        primary_lens: scope
        also_visible_through:
          - evidence
          - logic
        explanatory_variables:
          cognitive_pattern: null
          social_dynamic: authority_deference
          interaction: null
        was_targeted: false
        notes: >
          Emergent. Nia raises the environmental concern one final time
          (turn 08), but Marcus dismisses it by redirecting to source
          comparison rather than engaging with the substance. Nia concedes
          without her concern being addressed. The counter-argument is
          dismissed through social pressure (deference to "research"),
          not through reasoning.

    ai_perspective_evaluate:
      through_logic:
        observation: >
          I notice something interesting here. Nia asks about the
          environment — that's the question that started her concern. But
          the answer she gets is about whose information is more
          trustworthy, not about what happens to the environment. The
          original question is still sitting there unanswered.
        key_sentences:
          - turn_08.s01
          - turn_09.s01
      through_evidence:
        observation: >
          Looking at the evidence, I notice how the group decides which
          information to trust. Marcus says the website has "actual numbers"
          and describes the sibling's information as "just something she
          heard." But having numbers doesn't automatically make a source
          more reliable — it depends on who collected those numbers and why.
        key_sentences:
          - turn_09.s01
          - turn_09.s02
      through_scope:
        observation: >
          I notice that Nia brings up the environment one more time, and
          then the group moves past it. By the end of this part, the
          environmental question has been set aside — not because it was
          answered, but because the group found a different way to settle
          the disagreement.
        key_sentences:
          - turn_08.s01
          - turn_10.s01
      what_to_notice: >
        Look at what Nia asks in her turn and what Marcus talks about in
        his response. Are they talking about the same thing?
      what_to_notice_sentences:
        - turn_08.s01
        - turn_09.s01

    ai_perspective_explain:
      explanatory_note: >
        A researcher studying group decisions might point out two things
        happening at once here. There's a thinking pattern — accepting a
        source because it has numbers and looks official — and there's a
        group pattern — one person stepping back because the other seems to
        have "done the research."
      cognitive_connection: >
        One way to think about Marcus's move: instead of addressing Nia's
        question about the environment, he shifts to comparing sources —
        "numbers vs. something she heard." This is a kind of uncritical
        acceptance in action. The website's numbers feel convincing not
        because they answer the environmental question, but because numbers
        feel more real than a sibling's warning.
      social_connection: >
        A researcher who studies how groups make decisions might describe
        Nia's concession as authority deference — letting the person who
        seems to have the stronger evidence win, even when your concern
        hasn't been addressed. Nia doesn't change her mind because the
        environmental question was answered. She changes her mind because
        Marcus's source looks more like "real research."
      interaction_note: >
        Notice how the two patterns work together: Marcus's confidence in
        the website (uncritical acceptance) creates the impression that he
        has better information, which makes it easier for Nia to defer
        (authority deference). If Marcus were less certain, Nia might have
        held her ground longer.

    diversity_potential:
      expected_lens_split: >
        All three lenses produce distinct readings here. Logic students see
        the unanswered question. Evidence students see the source comparison.
        Scope students see the environmental concern being dropped. This is
        the passage with the highest perspectival diversity.
      likely_student_observations:
        - lens: logic
          observations:
            - Nia asks about the environment but Marcus responds about sources
            - The original question is never answered
          might_miss:
            - That Marcus's response is a deflection, not an answer — it changes the subject without seeming to
        - lens: evidence
          observations:
            - Marcus contrasts "actual numbers" with "something she heard"
            - He treats the company as more trustworthy than one person
          might_miss:
            - That a company selling single-stream recycling has a financial interest in promoting it
        - lens: scope
          observations:
            - Nia raises the environmental concern and then drops it
            - The group reaches agreement without resolving the original disagreement
          might_miss:
            - That Nia drops her concern because of social pressure, not because she was convinced

  # ── Passage 5: Agreement and resolution ──────────────────────────
  - passage_id: passage_05
    turns:
      - turn_11
      - turn_12
    sentence_range:
      - turn_11.s01
      - turn_11.s02
      - turn_12.s01

    facet_annotations:
      - facet_id: consequence_consideration
        quality_level: weak
        evidence_sentences:
          - turn_11.s01
          - turn_11.s02
          - turn_12.s01
        primary_lens: scope
        also_visible_through:
          - logic
        explanatory_variables:
          cognitive_pattern: tunnel_vision
          social_dynamic: null
          interaction: null
        was_targeted: false
        notes: >
          Emergent. The group reaches a decision — recommend single-stream —
          without considering what would happen if they're wrong. What if
          single-stream does end up in landfills more often? What would that
          mean for the school's environmental goals? Marcus frames the
          outcome as a "win-win" without examining downstream effects.

    ai_perspective_evaluate:
      through_logic:
        observation: null
        key_sentences: []
      through_evidence:
        observation: null
        key_sentences: []
      through_scope:
        observation: >
          Looking at how the group wraps up, I notice they describe the
          decision as helping everyone — a "win-win." But the environmental
          question that came up earlier is no longer part of the
          conversation. The group decided without circling back to it.
        key_sentences:
          - turn_11.s01
          - turn_11.s02
      what_to_notice: >
        Think back to what Nia was worried about at the beginning. Is that
        concern part of the group's final recommendation?
      what_to_notice_sentences:
        - turn_11.s01

    ai_perspective_explain:
      explanatory_note: >
        A researcher might notice that the group's conclusion focuses on
        the immediate benefit (helping the staff) without thinking through
        what might go wrong. This is sometimes called tunnel vision —
        focusing so closely on one part of the problem that you lose sight
        of the bigger picture you started with.
      cognitive_connection: >
        One way to think about this: the group started with two concerns —
        practical and environmental. By the end, only the practical concern
        shaped the decision. That narrowing happened gradually, and by this
        point, neither Marcus nor Nia seems to notice that the
        environmental side was never resolved.
      social_connection: null
      interaction_note: null

    diversity_potential:
      expected_lens_split: >
        Scope students will see the most here — the dropped concern and the
        unexamined conclusion. Logic and Evidence students may not find much
        new in this closing passage.
      likely_student_observations:
        - lens: logic
          observations:
            - The decision is stated as settled
          might_miss:
            - That the reasoning behind the decision was incomplete
        - lens: evidence
          observations:
            - Marcus says "the data backs it up"
          might_miss:
            - That this is a restatement, not new evidence
        - lens: scope
          observations:
            - The environmental concern is absent from the final recommendation
            - Marcus calls it a "win-win" but only one side was considered
          might_miss:
            - That the group never decided the environment didn't matter — they just stopped talking about it
