  # ── Passage 5: Agreement and resolution ──────────────────────────
  - passage_id: passage_05
    turns:
      - turn_11
      - turn_12

    evaluate:
      difficulty: accessible
      partial_hints:
        - lens: logic
          hints:
            - >
              Think about everything the group discussed. Is it all
              reflected in this final decision?
        - lens: evidence
          hints:
            - >
              Marcus says the data backs up the decision. Think about
              what data he means...
        - lens: scope
          hints:
            - >
              Think back to the beginning of the conversation. What
              concerns were raised then? Which ones made it into the
              final recommendation?

      lens_entry_prompts:
        - lens: logic
          prompt: >
            Looking through Logic: does the group's final
            recommendation match everything they discussed, or is
            something missing?
        - lens: evidence
          prompt: >
            Looking through Evidence: Marcus says "the data backs it
            up." What data is he referring to? Is that new, or a
            repeat of earlier?
        - lens: scope
          prompt: >
            Looking through Scope: the group makes a recommendation.
            Does it address all the concerns from earlier, or just
            some of them?

      ai_reflection_prompts:
        - lens: logic
          prompt: >
            The AI didn't highlight anything through Logic here.
            Did you notice anything, or does this part feel like a
            natural ending?
        - lens: evidence
          prompt: >
            The AI didn't highlight much through Evidence here. Did
            you notice Marcus saying "the data backs it up"? Is that
            adding something new?
        - lens: scope
          prompt: >
            The AI noticed the environmental question isn't part of
            the final decision. Did that stand out to you? Do you
            think it matters?

    explain:
      passage_sentence_starters:
        - category: cognitive
          starter: >
            I think the group feels confident about their decision
            because...
        - category: social
          starter: >
            By this point, I think neither person wanted to bring up
            the environment again because...
        - category: interaction
          starter: >
            The group ended up only thinking about one side of the
            problem because...

      bridge_prompts:
        - lens: logic
          prompt: >
            You looked at the group's conclusion. Now think about
            the path they took to get there — why did they end up
            with a decision that only covers part of the problem?
        - lens: evidence
          prompt: >
            You noticed what Marcus counts as data. Now think about
            how the group ended up relying on just that one source —
            what happened along the way?
        - lens: scope
          prompt: >
            You noticed what's missing from the recommendation. Now
            think about why it's missing — what happened during the
            conversation that caused the group to narrow their view?

      ai_reflection_prompt: >
        The AI talked about focusing so closely on one part of the
        problem that you miss the bigger picture. Does that describe
        what happened here? What was the bigger picture the group
        lost track of?

    common_misreadings:
      - lens: logic
        misreadings:
          - pattern: >
              The decision makes sense because they have a good reason
            redirect: >
              Think about all the reasons that came up during the whole
              conversation. Are they all part of this decision?
      - lens: evidence
        misreadings:
          - pattern: >
              They have data to support their decision
            redirect: >
              Think about where that data came from. Is there anything
              about that source that might matter?
      - lens: scope
        misreadings:
          - pattern: >
              It's a win-win because it helps the staff and recycling works
            redirect: >
              Marcus calls it a win-win. Think about who might not be
              winning — was every concern from the conversation
              included?

    observation_rubric:
      - lens: logic
        levels:
          - level: basic
            examples:
              - >
                They decided to switch to single-stream.
          - level: developing
            examples:
              - >
                They made a decision, but the environmental question
                from earlier isn't part of it.
          - level: differentiated
            examples:
              - >
                The group reaches a conclusion that sounds complete —
                it helps the staff and the data supports it — but the
                environmental concern was never resolved. The decision
                looks solid only if you forget that the environment
                was part of the conversation.
      - lens: evidence
        levels:
          - level: basic
            examples:
              - >
                Marcus says the data backs it up.
          - level: developing
            examples:
              - >
                Marcus is repeating what the website said — this isn't
                new information, just a reminder of the same source.
          - level: differentiated
            examples:
              - >
                Marcus says "the data backs it up" but he's referring
                to the same recycling company website from before.
                The group's whole recommendation depends on that one
                source, and they never checked whether it was giving
                them the full story.
      - lens: scope
        levels:
          - level: basic
            examples:
              - >
                They're recommending single-stream.
          - level: developing
            examples:
              - >
                They call it a win-win, but the environmental side
                is missing from the recommendation.
          - level: differentiated
            examples:
              - >
                Marcus calls it a win-win, but the "win" only covers
                the staff side. The environmental concern that Nia
                raised at the beginning isn't just unresolved — it's
                not even mentioned anymore. The group narrowed their
                view without deciding to, and they don't seem to
                realize anything is missing.

    explanation_rubric:
      categories:
        - category: cognitive
          levels:
            - level: basic
              examples:
                - >
                  They just forgot about the environment.
            - level: developing
              examples:
                - >
                  The group got so focused on the practical side —
                  helping the staff — that they stopped thinking about
                  the environmental question.
        - category: social
          levels:
            - level: basic
              examples:
                - >
                  They both wanted to agree.
            - level: developing
              examples:
                - >
                  By this point, Nia had already backed down, so
                  there was nobody left to bring up the environment.
                  Once she agreed, the concern disappeared.
        - category: interaction
          levels:
            - level: developing
              examples:
                - >
                  The group focused on helping the staff and Nia had
                  already given up her concern, so the environment
                  just dropped out of the conversation.
            - level: differentiated
              examples:
                - >
                  The group's focus on helping the staff kept their
                  attention on the practical side, and once Nia
                  stepped back, there was nobody to bring the
                  environmental concern back. The narrowed focus and
                  the social pressure worked together — the more the
                  group agreed, the less room there was to raise what
                  was missing, and the less anyone noticed it was gone.
