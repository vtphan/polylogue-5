          levels:
            - level: developing
              examples:
                - >
                  Marcus was convinced by the website, and his
                  confidence about it made Nia feel like she should
                  step back, even though her question was never
                  answered.
            - level: differentiated
              examples:
                - >
                  Marcus trusted the website because it had numbers
                  and looked professional, which made him really
                  confident. That confidence made Nia feel like he had
