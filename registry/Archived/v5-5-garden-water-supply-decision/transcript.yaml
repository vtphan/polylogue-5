scenario_id: garden-water-supply-decision
personas:
- name: Maya
  perspective: 'Thinks rain barrels are the better choice for the school garden — better for the environment
    and a more exciting project.

    '
- name: Jake
  perspective: 'Thinks using the school''s hose is the practical choice — it''s simple and they have a
    spring deadline to meet.

    '
