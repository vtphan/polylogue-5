    sentence_id: turn_04.s02
  turn_id: turn_04
- speaker: Marina
  sentences:
  - text: We can figure that out later, that's not the point right now.
    sentence_id: turn_05.s01
  - text: The point is sea turtles are literally dying because they eat plastic bags thinking it's food.
    sentence_id: turn_05.s02
  turn_id: turn_05
- speaker: Diego
  sentences:
  - text: Yeah that's really bad, but with deforestation we could plant trees in the courtyard and actually
