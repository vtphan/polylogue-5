    sentence_id: turn_02.s02
  turn_id: turn_02
- speaker: Marina
  sentences:
  - text: But did you know there's like millions of tons of plastic getting dumped in the ocean every
      single year?
    sentence_id: turn_03.s01
  - text: And there's this garbage patch in the Pacific that's twice the size of Texas, so we should definitely
