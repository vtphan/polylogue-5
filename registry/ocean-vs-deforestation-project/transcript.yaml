scenario_id: ocean-vs-deforestation-project
personas:
- name: Marina
  perspective: 'Believes ocean pollution is the most important environmental issue and wants the group
    to focus their project on it after watching a documentary.

    '
- name: Diego
  perspective: 'Thinks the group should pick deforestation because it''s something they can actually work
    on at their school.

    '
