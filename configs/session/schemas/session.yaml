# Schema: Session Configuration
# Describes the structure of registry/{scenario_id}/session.yaml
# Assembled from transcript + analysis + scaffolding artifacts.
# Source: pipeline-spec.md Section 2.5

schema:
  root:
    type: object
    fields:
      scenario_id:
        type: string
        required: true

      transcript_file:
        type: string
        required: true
        description: Path to transcript.yaml.

      analysis_file:
        type: string
        required: true
        description: Path to analysis.yaml.

      scaffolding_file:
        type: string
        required: true
        description: Path to scaffolding.yaml.

      onboarding:
        type: object
        required: true
        description: Displayed before evaluation begins.
        fields:
          topic_summary:
            type: string
            required: true
            description: >
              Brief context for students. E.g., "A group of students is discussing..."
          reading_instruction:
            type: string
            required: true
            description: >
              E.g., "Read the discussion, then we'll look at it together through
              different lenses."

      passages:
        type: list
        required: true
        description: Which parts of the transcript students evaluate.
        items:
          type: object
          fields:
            passage_id:
              type: string
              required: true
              description: Must match passage_ids in analysis.yaml.
              constraints:
                pattern: "passage_\\d{2}"
            turns:
              type: list
              required: true
              description: Turn IDs in this passage.
              items:
                type: string
            evaluable:
              type: boolean
              required: true
              description: Whether students evaluate this passage (some are context-setting).
            suggested_order:
              type: integer
              required: false
              description: >
                Suggested evaluation order (1 = first). Based on difficulty signal
                from scaffolding.yaml. Teacher can override.

      lens_definitions:
        type: list
        required: true
        description: The three lenses, as shown to students.
        items:
          type: object
          fields:
            lens_id:
              type: string
              required: true
              constraints:
                enum: [logic, evidence, scope]
            name:
              type: string
              required: true
              description: Display name.
            question:
              type: string
              required: true
              description: The lens question.

      lens_scope:
        type: string
        required: true
        description: >
          Lenses apply to the Evaluate phase only. The Explain phase is
          lens-independent.
        constraints:
          enum: [evaluate_only]

      # --- Evaluate phase configuration ---
      evaluate_phase:
        type: object
        required: true
        fields:
          sequence:
            type: list
            required: true
            constraints:
              value: [individual, peer, ai]
          individual:
            type: object
            required: true
            fields:
              instructions:
                type: string
                required: true
                description: What the app tells the student to do.
              rating_options:
                type: list
                required: true
                constraints:
                  value: [strong, weak]
              articulation_prompt:
                type: string
                required: true
                description: E.g., "What do you see? Why did you rate it this way?"
          peer:
            type: object
            required: true
            fields:
              instructions:
                type: string
                required: true
          ai:
            type: object
            required: true
            fields:
              instructions:
                type: string
                required: true
              source:
                type: string
                required: true
                description: Which block in analysis.yaml to render.
                constraints:
                  enum: [ai_perspective_evaluate]
              response_required:
                type: boolean
                required: true
                description: >
                  If true, student must write a brief response before phase is complete.
              response_prompt:
                type: string
                required: true
                description: >
                  Prompt for the required response. Passage-specific reflection
                  prompts from scaffolding.yaml override this generic prompt.
          # CHECKLIST: evaluate_phase.completion_threshold
          completion_threshold:
            type: integer
            required: true
            description: Minimum passages to evaluate before moving to Peer step.

      # --- Explain phase configuration ---
      explain_phase:
        type: object
        required: true
        fields:
          sequence:
            type: list
            required: true
            constraints:
              value: [individual, peer, ai]
          individual:
            type: object
            required: true
            fields:
              instructions:
                type: string
                required: true
              explanation_prompt:
                type: string
                required: true
                description: E.g., "Why do you think they reasoned this way?"
              # CHECKLIST: explain_phase.individual.sentence_starters
              sentence_starters:
                type: list
                required: true
                description: >
                  Session-level generic starters. Teacher-controlled.
                  Distinct from passage-specific starters in scaffolding.yaml.
                items:
                  type: object
                  fields:
                    category:
                      type: string
                      required: true
                      constraints:
                        enum: [cognitive, social, interaction]
                    starter:
                      type: string
                      required: true
                      description: >
                        E.g., cognitive: "I think they reasoned this way because
                        they were focused on..."
          peer:
            type: object
            required: true
            fields:
              instructions:
                type: string
                required: true
          ai:
            type: object
            required: true
            fields:
              instructions:
                type: string
                required: true
              source:
                type: string
                required: true
                constraints:
                  enum: [ai_perspective_explain]
              response_required:
                type: boolean
                required: true
              response_prompt:
                type: string
                required: true
          # CHECKLIST: explain_phase.reference_lists
          reference_lists:
            type: object
            required: true
            description: >
              Optional browsable vocabulary reference. Teacher decides whether to show.
            fields:
              show_cognitive_patterns:
                type: boolean
                required: true
              show_social_dynamics:
                type: boolean
                required: true
              cognitive_patterns:
                type: list
                required: true
                items:
                  type: object
                  fields:
                    id:
                      type: string
                      required: true
                    name:
                      type: string
                      required: true
                    description:
                      type: string
                      required: true
              social_dynamics:
                type: list
                required: true
                items:
                  type: object
                  fields:
                    id:
                      type: string
                      required: true
                    name:
                      type: string
                      required: true
                    description:
                      type: string
                      required: true
          # CHECKLIST: explain_phase.completion_threshold
          completion_threshold:
            type: integer
            required: true
            description: Minimum passages to explain before moving to Peer step.
