# Schema: Scaffolding Materials
# Describes the structure of registry/{scenario_id}/scaffolding.yaml
# Pedagogical materials the app needs at runtime — hints, prompts, starters, rubrics.
# Source: pipeline-spec.md Section 2.6

schema:
  root:
    type: object
    fields:
      scenario_id:
        type: string
        required: true

      passage_scaffolding:
        type: list
        required: true
        description: One entry per evaluable passage.
        items:
          type: object
          fields:
            passage_id:
              type: string
              required: true
              constraints:
                pattern: "passage_\\d{2}"
            turns:
              type: list
              required: true
              items:
                type: string

            # --- Evaluate phase scaffolding ---
            evaluate:
              type: object
              required: true
              fields:
                # CHECKLIST: passage_scaffolding[].evaluate.difficulty
                difficulty:
                  type: string
                  required: true
                  description: >
                    Based on two criteria: (1) cross-lens visibility — high = accessible,
                    low = challenging; (2) signal strength — how obvious the targeted
                    facet is in the text. The app uses this to suggest passage order.
                  constraints:
                    enum: [accessible, moderate, challenging]

                # CHECKLIST: passage_scaffolding[].evaluate.partial_hints
                partial_hints:
                  type: list
                  required: true
                  description: >
                    Per-lens starting points for stuck students. Deliberately incomplete —
                    direct attention to WHERE to look, not WHAT to see.
                  items:
                    type: object
                    fields:
                      lens:
                        type: string
                        required: true
                        constraints:
                          enum: [logic, evidence, scope]
                      hints:
                        type: list
                        required: true
                        description: >
                          E.g., "Something about the sources..." or
                          "Notice how the conclusion compares to the evidence..."
                        items:
                          type: string

                # CHECKLIST: passage_scaffolding[].evaluate.lens_entry_prompts
                lens_entry_prompts:
                  type: list
                  required: true
                  description: >
                    Per-lens, per-passage prompts more specific than the generic
                    lens question. Keyed by lens ID.
                  items:
                    type: object
                    fields:
                      lens:
                        type: string
                        required: true
                        constraints:
                          enum: [logic, evidence, scope]
                      prompt:
                        type: string
                        required: true
                        description: >
                          E.g., "Looking through Evidence: what sources did they use,
                          and are those sources convincing?"

                # CHECKLIST: passage_scaffolding[].evaluate.ai_reflection_prompts
                ai_reflection_prompts:
                  type: list
                  required: true
                  description: >
                    Per-lens prompts shown after the Evaluate AI reveal. Keyed by lens ID.
                  items:
                    type: object
                    fields:
                      lens:
                        type: string
                        required: true
                        constraints:
                          enum: [logic, evidence, scope]
                      prompt:
                        type: string
                        required: true
                        description: >
                          E.g., "The AI noticed the sources all come from one place.
                          Did you notice that too, or were you looking at something different?"

            # --- Explain phase scaffolding ---
            explain:
              type: object
              required: true
              fields:
                # CHECKLIST: passage_scaffolding[].explain.passage_sentence_starters
                passage_sentence_starters:
                  type: list
                  required: true
                  description: >
                    Passage-specific starters, more directed than the generic
                    session-level starters.
                  items:
                    type: object
                    fields:
                      category:
                        type: string
                        required: true
                        constraints:
                          enum: [cognitive, social, interaction]
                      starter:
                        type: string
                        required: true
                        description: >
                          E.g., "I think Maya kept going back to cost because..."

                # CHECKLIST: passage_scaffolding[].explain.bridge_prompts
                bridge_prompts:
                  type: list
                  required: true
                  description: >
                    Per-lens prompts connecting the student's Evaluate observation
                    to the Explain task. The app selects the variant matching the
                    student's Evaluate lens. Keyed by lens ID.
                  items:
                    type: object
                    fields:
                      lens:
                        type: string
                        required: true
                        constraints:
                          enum: [logic, evidence, scope]
                      prompt:
                        type: string
                        required: true
                        description: >
                          E.g., Evidence: "You noticed something about the evidence.
                          Now think about *why* — what was going on in the group
                          when this happened?"

                # CHECKLIST: passage_scaffolding[].explain.ai_reflection_prompt
                ai_reflection_prompt:
                  type: string
                  required: true
                  description: >
                    Shown after the Explain AI reveal. E.g., "The AI called this
                    confirmation bias. Does that match what you were trying to say,
                    or do you see it differently?"

            # CHECKLIST: passage_scaffolding[].common_misreadings
            common_misreadings:
              type: list
              required: true
              description: >
                Per-lens predictable misinterpretations the app can detect and
                respond to without LLM access at runtime.
              items:
                type: object
                fields:
                  lens:
                    type: string
                    required: true
                    constraints:
                      enum: [logic, evidence, scope]
                  misreadings:
                    type: list
                    required: true
                    items:
                      type: object
                      fields:
                        pattern:
                          type: string
                          required: true
                          description: >
                            What the student might write. Specific enough for
                            keyword/semantic matching without LLM access at runtime.
                        redirect:
                          type: string
                          required: true
                          description: >
                            Gentle prompt that redirects without giving the answer.
                            Student-friendly language. Does not name the correct
                            observation — just redirects attention.

            # CHECKLIST: passage_scaffolding[].observation_rubric
            observation_rubric:
              type: list
              required: true
              description: >
                Per-lens rubric for Evaluate phase articulation quality.
                Three differentiation levels.
              items:
                type: object
                fields:
                  lens:
                    type: string
                    required: true
                    constraints:
                      enum: [logic, evidence, scope]
                  levels:
                    type: list
                    required: true
                    description: Three levels of differentiation.
                    items:
                      type: object
                      fields:
                        level:
                          type: string
                          required: true
                          constraints:
                            enum: [basic, developing, differentiated]
                        examples:
                          type: list
                          required: true
                          description: Example student articulations at this level.
                          items:
                            type: string

            # CHECKLIST: passage_scaffolding[].explanation_rubric
            explanation_rubric:
              type: object
              required: true
              description: >
                Lens-independent rubric for Explain phase. Organized by explanation
                type (cognitive, social, interaction) and level.
              fields:
                categories:
                  type: list
                  required: true
                  items:
                    type: object
                    fields:
                      category:
                        type: string
                        required: true
                        constraints:
                          enum: [cognitive, social, interaction]
                      levels:
                        type: list
                        required: true
                        description: >
                          Cognitive and social categories have basic and developing.
                          Interaction category has developing and differentiated
                          (no basic — interaction is inherently at least developing).
                        items:
                          type: object
                          fields:
                            level:
                              type: string
                              required: true
                              constraints:
                                enum: [basic, developing, differentiated]
                            examples:
                              type: list
                              required: true
                              items:
                                type: string
